# Deploy do frontend Next.js em GitHub Pages (site estático em /Trampei).
# O backend (Express + MongoDB + Socket.io) precisa estar em outro host (Render, Railway, Fly.io, etc.).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Layouts para export estático (somente Pages)
        working-directory: client
        run: |
          mkdir -p 'app/perfil/[id]' 'app/servicos/[id]'
          tee 'app/perfil/[id]/layout.js' > /dev/null <<'LAYOUTEOF'
          export async function generateStaticParams() {
            return [{ id: "demo" }];
          }
          export const dynamicParams = false;
          export default function Layout({ children }) {
            return children;
          }
          LAYOUTEOF
          cp 'app/perfil/[id]/layout.js' 'app/servicos/[id]/layout.js'

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build (static export)
        working-directory: client
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /Trampei
          NEXT_PUBLIC_SITE_URL: https://lucasmorada.github.io/Trampei
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
